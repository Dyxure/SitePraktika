services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-8080}:8080"
    environment:
      PORT: "8080"
      # Почта и Telegram (или задайте через env_file)
      # SMTP_HOST:
      # SMTP_PORT: "587"
      # SMTP_SECURE: "false"
      # SMTP_USER:
      # SMTP_PASS:
      # EMAIL_FROM:
      # EMAIL_TO:
      # TELEGRAM_BOT_TOKEN:
      # TELEGRAM_CHAT_ID:
    env_file:
      - path: .env
        required: false
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8080/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
